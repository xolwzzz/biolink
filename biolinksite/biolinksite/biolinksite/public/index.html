<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio Link</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600&family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@600;700&family=DM+Serif+Display&family=Bebas+Neue&family=Abril+Fatface&family=Cinzel:wght@700&family=Josefin+Sans:wght@600;700&family=Outfit:wght@600;700&family=Raleway:wght@700;800&family=Caveat:wght@700&family=Sacramento&family=Dancing+Script:wght@700&family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      min-height: 100vh;
      background: #000;
      overflow-x: hidden;
    }

    /* Video background */
    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.92) 0%,
        rgba(0,0,0,0.5) 40%,
        rgba(0,0,0,0.2) 100%
      );
    }

    /* Fallback gradient background */
    .fallback-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse at 30% 20%, #1a0a2e 0%, #000 50%, #0a1a0a 100%);
    }

    .fallback-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(100,50,200,0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(50,200,100,0.1) 0%, transparent 40%);
    }

    /* Main layout */
    .page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 40px 24px 60px;
      text-align: center;
    }

    /* Profile section */
    .profile {
      width: 100%;
      max-width: 420px;
      animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      margin: 0 auto 20px;
      overflow: hidden;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .name {
      font-size: 42px;
      font-weight: 700;
      color: #fff;
      line-height: 1.05;
      margin-bottom: 12px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      letter-spacing: -0.01em;
    }

    .bio {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      margin-bottom: 32px;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Links */
    .links { width: 100%; }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: all 0.2s;
      cursor: pointer;
      animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .link-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-1px);
    }

    .link-btn:active { transform: scale(0.99); }

    /* Staggered animation delays */
    .link-btn:nth-child(1) { animation-delay: 0.1s; }
    .link-btn:nth-child(2) { animation-delay: 0.15s; }
    .link-btn:nth-child(3) { animation-delay: 0.2s; }
    .link-btn:nth-child(4) { animation-delay: 0.25s; }
    .link-btn:nth-child(5) { animation-delay: 0.3s; }

    /* Watermark */
    .watermark {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      text-decoration: none;
    }

    .watermark:hover { color: rgba(255,255,255,0.5); }

    /* Loading */
    .loading {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s;
    }

    .loading.hide { opacity: 0; pointer-events: none; }

    .loading-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-dot"></div>
  </div>

  <div id="bgContainer"></div>

  <main class="page">
    <div class="profile" id="profile" style="display:none">
      <div class="avatar" id="avatar">✦</div>
      <div class="name" id="name">Loading...</div>
      <div class="bio" id="bio"></div>
      <div class="links" id="links"></div>
    </div>
  </main>

  <a href="/login" class="watermark">Biolink ●</a>

  <script>
    async function init() {
      try {
        const res = await fetch('/api/profile');
        const data = await res.json();

        // Background
        const bgContainer = document.getElementById('bgContainer');
        if (data.video_path) {
          bgContainer.innerHTML = `
            <div class="video-bg">
              <video autoplay muted loop playsinline>
                <source src="${data.video_path}" />
              </video>
            </div>
          `;
        } else {
          bgContainer.innerHTML = '<div class="fallback-bg"></div>';
        }

        // Name font
        document.getElementById('name').style.fontFamily = `'${data.font_family}', serif`;

        // Content
        document.getElementById('name').textContent = data.display_name || '';
        document.getElementById('bio').textContent = data.bio || '';

        // Links
        const linksEl = document.getElementById('links');
        (data.links || []).forEach(link => {
          if (!link.url) return;
          const a = document.createElement('a');
          a.className = 'link-btn';
          a.href = link.url.startsWith('http') ? link.url : 'https://' + link.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = link.label || link.url;
          linksEl.appendChild(a);
        });

        document.getElementById('profile').style.display = 'block';
      } catch (e) {
        document.getElementById('bgContainer').innerHTML = '<div class="fallback-bg"></div>';
        document.getElementById('name').textContent = 'Coming Soon';
        document.getElementById('profile').style.display = 'block';
      }

      // Hide loading screen
      setTimeout(() => {
        document.getElementById('loading').classList.add('hide');
      }, 400);
    }

    init();
  </script>
</body>
</html>
