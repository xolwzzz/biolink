<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f5f4f0; --white: #fff; --border: #e8e8e8; --text: #111; --muted: #999; --muted2: #666; }
    html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100%; }
    .header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 10; }
    .header-brand { font-size: 14px; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-link { font-size: 13px; color: var(--muted2); text-decoration: none; }
    .header-link:hover { color: var(--text); }
    .logout-btn { padding: 7px 14px; background: none; border: 1px solid var(--border); border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--muted2); cursor: pointer; transition: all 0.12s; }
    .logout-btn:hover { border-color: #f87171; color: #ef4444; }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 40px; }
    .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 36px; }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 36px; }
    .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; }
    .stat-num { font-size: 32px; font-weight: 600; letter-spacing: -0.03em; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .section-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
    .table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 36px; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); background: var(--bg); }
    td { font-size: 13px; padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .badge-admin { background: #111; color: #fff; }
    .badge-member { background: var(--border); color: var(--muted2); }
    .action-btn { padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--muted2); font-family: 'Inter', sans-serif; transition: all 0.12s; margin-right: 4px; }
    .action-btn:hover { border-color: #ccc; color: var(--text); }
    .action-btn.del:hover { border-color: #fecaca; color: #ef4444; }

    .visits-table td { font-size: 12px; }
    .ua { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }

    .toast { position: fixed; bottom: 20px; right: 20px; z-index: 200; padding: 10px 18px; background: var(--text); color: #fff; border-radius: 6px; font-size: 13px; font-weight: 500; transform: translateY(10px); opacity: 0; transition: all 0.25s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.err { background: #dc2626; }

    .empty { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
<div class="header">
  <div class="header-brand">biolink — Admin</div>
  <div class="header-right">
    <a href="/dashboard" class="header-link">My dashboard</a>
    <button class="logout-btn" id="logoutBtn">Sign out</button>
  </div>
</div>

<div class="wrap">
  <div class="page-title">Admin panel</div>
  <div class="page-sub">Overview of all accounts and site activity</div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statUsers">—</div><div class="stat-label">Total accounts</div></div>
    <div class="stat-card"><div class="stat-num" id="statViews">—</div><div class="stat-label">Total page views</div></div>
    <div class="stat-card"><div class="stat-num" id="statToday">—</div><div class="stat-label">Views today</div></div>
  </div>

  <div class="section-title">All accounts</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Username</th><th>Display name</th><th>Role</th><th>Views</th><th>Last visit</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody id="usersTable"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>

  <div class="section-title">Recent visits (last 200)</div>
  <div class="table-wrap visits-table">
    <table>
      <thead><tr><th>Time</th><th>Username</th><th>IP</th><th>Referrer</th><th>User agent</th></tr></thead>
      <tbody id="visitsTable"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function toast(msg, err) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (err ? ' err' : '');
  t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 2500);
}
function fmt(dt) {
  if (!dt) return '—';
  var d = new Date(dt.replace ? dt.replace(' ', 'T') + 'Z' : dt);
  return isNaN(d) ? dt : d.toLocaleString();
}
function fmtDate(dt) {
  if (!dt) return '—';
  var d = new Date(dt.replace ? dt.replace(' ', 'T') + 'Z' : dt);
  return isNaN(d) ? dt : d.toLocaleDateString();
}

// Load users
fetch('/admin/api/users').then(function(r) {
  if (r.status === 403 || r.status === 401) { window.location.href = '/login'; return Promise.reject(); }
  return r.json();
}).then(function(users) {
  document.getElementById('statUsers').textContent = users.length;
  var totalViews = users.reduce(function(s, u) { return s + (u.view_count || 0); }, 0);
  document.getElementById('statViews').textContent = totalViews;

  var tbody = document.getElementById('usersTable');
  if (!users.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No accounts yet.</td></tr>'; return; }
  tbody.innerHTML = users.map(function(u) {
    return '<tr>' +
      '<td><strong>' + esc(u.username) + '</strong></td>' +
      '<td>' + esc(u.display_name || '—') + '</td>' +
      '<td><span class="badge ' + (u.is_admin ? 'badge-admin' : 'badge-member') + '">' + (u.is_admin ? 'Admin' : 'Member') + '</span></td>' +
      '<td>' + (u.view_count || 0) + '</td>' +
      '<td>' + (u.last_visit ? fmt(u.last_visit) : '—') + '</td>' +
      '<td>' + fmtDate(u.created_at) + '</td>' +
      '<td>' +
        '<a class="action-btn" href="/' + encodeURIComponent(u.username) + '" target="_blank">View page</a>' +
        (!u.is_admin ? '<button class="action-btn del" onclick="deleteUser(' + u.id + ',\'' + esc(u.username) + '\')">Delete</button>' : '') +
      '</td>' +
    '</tr>';
  }).join('');
}).catch(function() {});

// Load visits
fetch('/admin/api/visits').then(function(r) { return r.json(); }).then(function(visits) {
  var today = new Date().toDateString();
  var todayCount = visits.filter(function(v) { return new Date(v.visited_at.replace(' ','T')+'Z').toDateString() === today; }).length;
  document.getElementById('statToday').textContent = todayCount;

  var tbody = document.getElementById('visitsTable');
  if (!visits.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">No visits recorded yet.</td></tr>'; return; }
  tbody.innerHTML = visits.map(function(v) {
    return '<tr>' +
      '<td>' + fmt(v.visited_at) + '</td>' +
      '<td>' + esc(v.username) + '</td>' +
      '<td>' + esc(v.ip || '—') + '</td>' +
      '<td>' + esc(v.referrer || '—') + '</td>' +
      '<td class="ua">' + esc(v.user_agent || '—') + '</td>' +
    '</tr>';
  }).join('');
}).catch(function() {});

function deleteUser(id, username) {
  if (!confirm('Delete account "' + username + '"? This cannot be undone.')) return;
  fetch('/admin/api/users/' + id, { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) { toast('Deleted ' + username); setTimeout(function() { location.reload(); }, 800); }
      else toast(d.error || 'Failed', true);
    }).catch(function() { toast('Error', true); });
}

document.getElementById('logoutBtn').addEventListener('click', function() {
  fetch('/auth/logout', { method: 'POST' }).then(function() { window.location.href = '/login'; });
});

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
