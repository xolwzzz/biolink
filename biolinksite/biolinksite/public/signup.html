<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh; background: #000; color: #fff;
      font-family: 'Rajdhani', sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 100%, #0a001a 0%, #000 60%); }
    .scanlines { position: fixed; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px); }
    .card {
      position: relative; z-index: 10; width: 100%; max-width: 400px; margin: 20px;
      padding: 48px 40px;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
      border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px);
    }
    .card::before, .card::after, .corner-br, .corner-bl { content: ''; position: absolute; width: 16px; height: 16px; }
    .card::before { top: -1px; left: -1px; border-top: 2px solid #00cfff; border-left: 2px solid #00cfff; }
    .card::after  { top: -1px; right: -1px; border-top: 2px solid #bf00ff; border-right: 2px solid #bf00ff; }
    .corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid #00cfff; border-right: 2px solid #00cfff; }
    .corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid #bf00ff; border-left: 2px solid #bf00ff; }
    .logo { font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; background: linear-gradient(90deg, #00cfff, #bf00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 32px; }
    h1 { font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 6px; letter-spacing: 0.05em; }
    .sub { color: rgba(255,255,255,0.35); font-size: 13px; letter-spacing: 0.08em; margin-bottom: 36px; }
    label { display: block; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
    .field { margin-bottom: 20px; }
    input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600; padding: 13px 16px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; letter-spacing: 0.05em; }
    input:focus { border-color: rgba(0,207,255,0.6); box-shadow: 0 0 20px rgba(0,207,255,0.1); }
    .hint { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 6px; letter-spacing: 0.05em; }
    .strength { display: flex; gap: 4px; margin-top: 8px; }
    .s-bar { height: 2px; flex: 1; background: rgba(255,255,255,0.1); transition: background 0.3s; }
    .s-bar.weak { background: #ff4444; }
    .s-bar.medium { background: #ffa94d; }
    .s-bar.strong { background: #00cfff; }
    .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, rgba(0,207,255,0.15), rgba(191,0,255,0.15)); border: 1px solid rgba(0,207,255,0.4); color: #fff; font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
    .btn:hover { box-shadow: 0 0 30px rgba(0,207,255,0.3); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .error { margin-top: 16px; padding: 12px 14px; background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); color: #ff6b6b; font-size: 13px; display: none; }
    .success { margin-top: 16px; padding: 12px 14px; background: rgba(0,207,255,0.1); border: 1px solid rgba(0,207,255,0.3); color: #00cfff; font-size: 13px; display: none; }
    .footer { text-align: center; margin-top: 28px; font-size: 13px; color: rgba(255,255,255,0.3); letter-spacing: 0.05em; }
    .footer a { color: #00cfff; text-decoration: none; }
    .footer a:hover { color: #bf00ff; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="scanlines"></div>
  <div class="card">
    <div class="corner-br"></div><div class="corner-bl"></div>
    <div class="logo">◆ Biolink System</div>
    <h1>REGISTER</h1>
    <p class="sub">Create your account</p>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" autocomplete="username" placeholder="choose a username" maxlength="20" />
      <div class="hint">3–20 characters</div>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" autocomplete="new-password" placeholder="••••••••" id="password" />
      <div class="strength"><div class="s-bar" id="s1"></div><div class="s-bar" id="s2"></div><div class="s-bar" id="s3"></div><div class="s-bar" id="s4"></div></div>
      <div class="hint">Min 8 characters</div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="confirm" autocomplete="new-password" placeholder="••••••••" />
    </div>
    <button class="btn" id="signupBtn">Create Account →</button>
    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
    <div class="footer">Already registered? <a href="/login">Sign in</a></div>
  </div>
  <script>
    document.getElementById('password').addEventListener('input', function() {
      var pw = this.value;
      var bars = [document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3'),document.getElementById('s4')];
      bars.forEach(function(b){b.className='s-bar';});
      var score = 0;
      if(pw.length>=8)score++;if(/[A-Z]/.test(pw))score++;if(/[0-9]/.test(pw))score++;if(/[^A-Za-z0-9]/.test(pw))score++;
      var cls = score<=1?'weak':score<=2?'medium':'strong';
      for(var i=0;i<score;i++)bars[i].classList.add(cls);
    });

    var btn = document.getElementById('signupBtn');
    var errEl = document.getElementById('error');
    var sucEl = document.getElementById('success');

    function doSignup() {
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var confirm = document.getElementById('confirm').value;
      errEl.style.display='none'; sucEl.style.display='none';
      if(!username||!password||!confirm){errEl.textContent='All fields required.';errEl.style.display='block';return;}
      if(password!==confirm){errEl.textContent='Passwords do not match.';errEl.style.display='block';return;}
      btn.disabled=true; btn.textContent='Creating...';
      fetch('/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,password:password})})
      .then(function(res){return res.json().then(function(data){return{status:res.status,data:data};});})
      .then(function(r){
        if(r.status===200&&r.data.success){sucEl.textContent='Account created! Redirecting...';sucEl.style.display='block';setTimeout(function(){window.location.href='/login';},1500);}
        else{errEl.textContent=r.data.error||'Registration failed.';errEl.style.display='block';btn.disabled=false;btn.textContent='Create Account →';}
      }).catch(function(){errEl.textContent='Connection error.';errEl.style.display='block';btn.disabled=false;btn.textContent='Create Account →';});
    }

    btn.addEventListener('click', doSignup);
    document.addEventListener('keydown', function(e){if(e.key==='Enter')doSignup();});
  </script>
</body>
</html>
