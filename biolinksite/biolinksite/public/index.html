<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio Link</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --chrome1: #c0c0c0;
      --chrome2: #e8e8e8;
      --chrome3: #888;
      --pink: #ff69b4;
      --blue: #00cfff;
      --purple: #bf00ff;
      --gold: #ffd700;
    }

    html, body { min-height: 100vh; overflow-x: hidden; background: #000; }

    /* Video BG */
    .video-bg {
      position: fixed; inset: 0; z-index: 0;
    }
    .video-bg video {
      width: 100%; height: 100%; object-fit: cover; opacity: 0.35;
    }
    .video-bg::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 60%, rgba(0,0,0,0.95) 100%);
    }

    /* Fallback bg */
    .fallback-bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 50% 0%, #1a0030 0%, #000 60%);
    }
    .fallback-bg::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,207,255,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(191,0,255,0.07) 0%, transparent 50%);
    }

    /* Scanlines */
    .scanlines {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
    }

    /* Noise grain */
    .grain {
      position: fixed; inset: -200%; z-index: 3; pointer-events: none;
      width: 400%; height: 400%;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      animation: grain 0.5s steps(1) infinite;
    }
    @keyframes grain {
      0%,100% { transform: translate(0,0); }
      10% { transform: translate(-2%,-3%); }
      20% { transform: translate(3%,2%); }
      30% { transform: translate(-1%,4%); }
      40% { transform: translate(2%,-1%); }
      50% { transform: translate(-3%,1%); }
      60% { transform: translate(1%,3%); }
      70% { transform: translate(-2%,-2%); }
      80% { transform: translate(3%,-3%); }
      90% { transform: translate(-1%,2%); }
    }

    /* Page layout */
    .page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 24px;
    }

    /* Chrome orb / avatar */
    .avatar-wrap {
      position: relative;
      width: 100px; height: 100px;
      margin: 0 auto 28px;
      animation: floatY 3s ease-in-out infinite;
    }
    @keyframes floatY {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .avatar-orb {
      width: 100px; height: 100px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff 0%, var(--chrome2) 20%, var(--chrome1) 50%, var(--chrome3) 80%, #333 100%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.3),
        0 0 30px rgba(0,207,255,0.4),
        0 0 60px rgba(191,0,255,0.2),
        inset 0 0 20px rgba(0,0,0,0.3);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .avatar-orb img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-ring {
      position: absolute; inset: -6px; border-radius: 50%;
      border: 1px solid transparent;
      background: linear-gradient(135deg, var(--blue), var(--purple), var(--pink)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: spinRing 4s linear infinite;
    }
    @keyframes spinRing { to { transform: rotate(360deg); } }

    /* Name */
    .name {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 900;
      text-align: center;
      background: linear-gradient(135deg, #fff 0%, var(--chrome2) 30%, var(--blue) 60%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0,207,255,0.5));
      margin-bottom: 10px;
      letter-spacing: 0.05em;
      animation: nameGlow 3s ease-in-out infinite;
    }
    @keyframes nameGlow {
      0%,100% { filter: drop-shadow(0 0 20px rgba(0,207,255,0.5)); }
      50% { filter: drop-shadow(0 0 35px rgba(191,0,255,0.7)); }
    }

    /* Bio */
    .bio {
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-align: center;
      max-width: 300px;
      margin: 0 auto 36px;
      letter-spacing: 0.05em;
      line-height: 1.6;
    }

    /* Chrome divider */
    .divider {
      width: 200px;
      height: 1px;
      margin: 0 auto 32px;
      background: linear-gradient(90deg, transparent, var(--blue), var(--purple), transparent);
      position: relative;
    }
    .divider::before, .divider::after {
      content: '◆';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 8px;
      color: var(--blue);
    }
    .divider::before { left: 20px; }
    .divider::after { right: 20px; color: var(--purple); }

    /* Links */
    .links { width: 100%; max-width: 380px; }

    .link-btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      margin-bottom: 10px;
      text-decoration: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
      backdrop-filter: blur(10px);
      transition: all 0.25s;
      animation: linkIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    .link-btn:nth-child(1) { animation-delay: 0.05s; }
    .link-btn:nth-child(2) { animation-delay: 0.1s; }
    .link-btn:nth-child(3) { animation-delay: 0.15s; }
    .link-btn:nth-child(4) { animation-delay: 0.2s; }
    .link-btn:nth-child(5) { animation-delay: 0.25s; }
    @keyframes linkIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .link-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,207,255,0.15), rgba(191,0,255,0.15));
      opacity: 0;
      transition: opacity 0.25s;
    }
    .link-btn:hover::before { opacity: 1; }
    .link-btn:hover {
      border-color: rgba(0,207,255,0.5);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,207,255,0.2), 0 0 0 1px rgba(0,207,255,0.2);
    }
    .link-btn:active { transform: scale(0.98); }

    /* Corner decorations on links */
    .link-btn::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 8px; height: 8px;
      border-top: 1px solid var(--blue);
      border-left: 1px solid var(--blue);
    }

    /* Floating particles */
    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--blue);
      animation: float linear infinite;
      opacity: 0;
    }
    @keyframes float {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
    }

    /* Watermark */
    .watermark {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      z-index: 20;
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.15);
      text-decoration: none;
      text-transform: uppercase;
    }
    .watermark:hover { color: rgba(255,255,255,0.4); }

    /* Loading */
    .loading {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      transition: opacity 0.6s;
    }
    .loading.hide { opacity: 0; pointer-events: none; }
    .load-text {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--blue);
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:1} }
    .load-bar-bg { width: 120px; height: 2px; background: #111; }
    .load-bar { height: 2px; background: linear-gradient(90deg, var(--blue), var(--purple)); width: 0; animation: loadFill 0.8s ease forwards; }
    @keyframes loadFill { to { width: 100%; } }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="load-text">LOADING</div>
    <div class="load-bar-bg"><div class="load-bar"></div></div>
  </div>

  <div class="particles" id="particles"></div>
  <div id="bgContainer"></div>
  <div class="scanlines"></div>
  <div class="grain"></div>

  <main class="page">
    <div style="width:100%;max-width:380px;text-align:center" id="content" style="display:none">
      <div class="avatar-wrap">
        <div class="avatar-orb" id="avatar">✦</div>
        <div class="avatar-ring"></div>
      </div>
      <div class="name" id="name">NAME</div>
      <div class="bio" id="bio"></div>
      <div class="divider"></div>
      <div class="links" id="links"></div>
    </div>
  </main>

  <a href="/login" class="watermark">biolink sys v2.0</a>

  <script>
    // Particles
    var pc = document.getElementById('particles');
    for (var i = 0; i < 25; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.setProperty('--drift', (Math.random() * 100 - 50) + 'px');
      p.style.animationDuration = (8 + Math.random() * 15) + 's';
      p.style.animationDelay = (Math.random() * 15) + 's';
      p.style.background = Math.random() > 0.5 ? '#00cfff' : '#bf00ff';
      p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
      pc.appendChild(p);
    }

    async function init() {
      try {
        var res = await fetch('/api/profile');
        var data = await res.json();

        var bgContainer = document.getElementById('bgContainer');
        if (data.video_path) {
          bgContainer.innerHTML = '<div class="video-bg"><video autoplay muted loop playsinline><source src="' + data.video_path + '" /></video></div>';
        } else {
          bgContainer.innerHTML = '<div class="fallback-bg"></div>';
        }

        var nameEl = document.getElementById('name');
        nameEl.textContent = data.display_name || 'YOUR NAME';
        if (data.font_family && data.font_family !== 'Orbitron') {
          nameEl.style.fontFamily = "'" + data.font_family + "', serif";
        }

        document.getElementById('bio').textContent = data.bio || '';

        var linksEl = document.getElementById('links');
        (data.links || []).forEach(function(link) {
          if (!link.url) return;
          var a = document.createElement('a');
          a.className = 'link-btn';
          a.href = link.url.startsWith('http') ? link.url : 'https://' + link.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = link.label || link.url;
          linksEl.appendChild(a);
        });

        document.getElementById('content').style.display = 'block';
      } catch(e) {
        document.getElementById('bgContainer').innerHTML = '<div class="fallback-bg"></div>';
        document.getElementById('name').textContent = 'YOUR NAME';
        document.getElementById('content').style.display = 'block';
      }

      setTimeout(function() {
        document.getElementById('loading').classList.add('hide');
      }, 900);
    }

    init();
  </script>
</body>
</html>
