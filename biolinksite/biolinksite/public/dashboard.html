<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@600;700&family=DM+Serif+Display&family=Bebas+Neue&family=Abril+Fatface&family=Cinzel:wght@700&family=Josefin+Sans:wght@600;700&family=Outfit:wght@600;700&family=Raleway:wght@700;800&family=Caveat:wght@700&family=Sacramento&family=Dancing+Script:wght@700&family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #030303; --surface: #0a0a0a; --surface2: #0f0f0f;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
      --blue: #00cfff; --purple: #bf00ff; --pink: #ff69b4;
      --text: #e8e8e8; --muted: rgba(255,255,255,0.35);
    }
    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; }

    .layout { display: grid; grid-template-columns: 240px 1fr 300px; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
    }
    .logo {
      font-family: 'Orbitron', monospace; font-size: 9px;
      letter-spacing: 0.4em; text-transform: uppercase;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 36px;
    }
    .nav-section { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.2); margin-bottom: 10px; margin-top: 20px; }
    .nav-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; width: 100%; text-align: left;
      background: none; border: none; color: var(--muted);
      font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700;
      letter-spacing: 0.08em; cursor: pointer;
      border-left: 2px solid transparent; transition: all 0.15s;
    }
    .nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .nav-btn.active { color: var(--blue); border-left-color: var(--blue); background: rgba(0,207,255,0.05); }
    .sidebar-bottom { margin-top: auto; }
    .user-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 12px; margin-bottom: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 900; color: #000;
    }
    .user-name { font-size: 14px; font-weight: 700; letter-spacing: 0.05em; }
    .user-role { font-size: 10px; color: var(--blue); letter-spacing: 0.1em; text-transform: uppercase; }
    .logout-btn {
      width: 100%; padding: 10px; background: none;
      border: 1px solid rgba(255,50,50,0.2); color: rgba(255,100,100,0.6);
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
    }
    .logout-btn:hover { border-color: rgba(255,50,50,0.5); color: #ff6b6b; }

    /* Main */
    .main { padding: 36px; overflow-y: auto; }
    .page-title {
      font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 900;
      background: linear-gradient(135deg, #fff, var(--blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .page-sub { color: var(--muted); font-size: 13px; letter-spacing: 0.05em; margin-bottom: 32px; }

    .section-title {
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--blue);
      margin-bottom: 14px; display: flex; align-items: center; gap: 12px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(0,207,255,0.3), transparent); }
    .section { margin-bottom: 28px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      padding: 22px; position: relative;
    }
    /* Corner accents on cards */
    .card::before, .card::after {
      content: ''; position: absolute; width: 10px; height: 10px;
    }
    .card::before { top: -1px; left: -1px; border-top: 1px solid var(--blue); border-left: 1px solid var(--blue); }
    .card::after  { bottom: -1px; right: -1px; border-bottom: 1px solid var(--purple); border-right: 1px solid var(--purple); }

    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    input[type="text"], textarea {
      width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 14px;
      font-weight: 600; padding: 11px 14px; outline: none;
      transition: border-color 0.2s; resize: vertical; letter-spacing: 0.05em;
    }
    input[type="text"]:focus, textarea:focus { border-color: rgba(0,207,255,0.5); }

    /* Font grid */
    .font-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .font-opt {
      border: 1px solid var(--border); padding: 14px 8px;
      cursor: pointer; text-align: center; background: rgba(255,255,255,0.02);
      transition: all 0.15s; position: relative;
    }
    .font-opt:hover { border-color: rgba(255,255,255,0.2); }
    .font-opt.selected { border-color: var(--blue); background: rgba(0,207,255,0.06); }
    .font-opt.selected::after { content: ''; position: absolute; top: -1px; right: -1px; width: 6px; height: 6px; background: var(--blue); }
    .font-sample { font-size: 20px; color: #fff; margin-bottom: 4px; }
    .font-label { font-size: 9px; font-family: 'Rajdhani', sans-serif; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

    /* Upload zone */
    .upload-zone {
      border: 1px dashed rgba(0,207,255,0.25); padding: 36px;
      text-align: center; cursor: pointer; position: relative;
      transition: all 0.2s; background: rgba(0,207,255,0.02);
    }
    .upload-zone:hover { border-color: rgba(0,207,255,0.5); background: rgba(0,207,255,0.05); }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-icon { font-size: 28px; margin-bottom: 10px; color: var(--blue); }
    .upload-text { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); }
    .upload-sub { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 4px; }
    .current-video {
      display: flex; align-items: center; gap: 12px; margin-top: 12px;
      padding: 12px 14px; background: rgba(0,207,255,0.05); border: 1px solid rgba(0,207,255,0.2);
    }
    .video-name { font-family: 'Orbitron', monospace; font-size: 10px; color: var(--blue); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .remove-btn { background: none; border: none; color: rgba(255,100,100,0.6); cursor: pointer; font-size: 20px; padding: 0 4px; }
    .remove-btn:hover { color: #ff6b6b; }
    .progress-wrap { display: none; margin-top: 12px; }
    .progress-bg { background: rgba(255,255,255,0.05); height: 2px; }
    .progress-fill { background: linear-gradient(90deg, var(--blue), var(--purple)); height: 2px; width: 0; transition: width 0.3s; }
    .progress-txt { font-family: 'Orbitron', monospace; font-size: 9px; color: var(--blue); margin-top: 6px; letter-spacing: 0.1em; }

    /* Links */
    .link-row { display: grid; grid-template-columns: 1fr 1fr 38px; gap: 8px; margin-bottom: 8px; }
    .link-del { background: none; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 16px; transition: all 0.15s; }
    .link-del:hover { border-color: rgba(255,100,100,0.4); color: #ff6b6b; }
    .add-link-btn {
      width: 100%; padding: 10px; background: none;
      border: 1px dashed rgba(0,207,255,0.2); color: rgba(0,207,255,0.5);
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
    }
    .add-link-btn:hover { border-color: var(--blue); color: var(--blue); }

    /* Save */
    .save-row { display: flex; align-items: center; gap: 16px; }
    .save-btn {
      padding: 13px 32px;
      background: linear-gradient(135deg, rgba(0,207,255,0.15), rgba(191,0,255,0.15));
      border: 1px solid rgba(0,207,255,0.4);
      color: #fff; font-family: 'Orbitron', monospace; font-size: 10px;
      font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .save-btn:hover { box-shadow: 0 0 30px rgba(0,207,255,0.25); }
    .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .save-status { font-family: 'Orbitron', monospace; font-size: 10px; color: var(--blue); opacity: 0; transition: opacity 0.3s; letter-spacing: 0.15em; }
    .save-status.show { opacity: 1; }

    /* Preview panel */
    .preview-panel {
      background: var(--surface); border-left: 1px solid var(--border);
      padding: 24px; position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .preview-label { font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--blue); margin-bottom: 20px; }
    .preview-phone {
      background: #000; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; overflow: hidden; aspect-ratio: 9/18;
      max-width: 200px; margin: 0 auto; position: relative;
    }
    .preview-phone::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, #1a0030 0%, #000 60%); z-index: 0; }
    .preview-phone::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.8) 100%); z-index: 1; }
    .preview-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 12px; z-index: 2; text-align: center; }
    .preview-name { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 900; background: linear-gradient(135deg, #fff, #00cfff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
    .preview-bio { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 10px; line-height: 1.4; }
    .preview-link { display: block; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 6px 8px; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-align: center; margin-bottom: 5px; border-radius: 2px; }
    .view-live { display: block; text-align: center; margin-top: 16px; font-family: 'Orbitron', monospace; font-size: 9px; color: var(--blue); text-decoration: none; letter-spacing: 0.15em; }
    .view-live:hover { color: var(--purple); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      padding: 12px 20px; font-family: 'Orbitron', monospace; font-size: 10px;
      font-weight: 700; letter-spacing: 0.15em;
      border: 1px solid rgba(0,207,255,0.4); background: rgba(0,0,0,0.9);
      color: var(--blue); transform: translateY(20px); opacity: 0; transition: all 0.3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .preview-panel { display: none; }
    }
  </style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">◆ Biolink Sys</div>
    <div class="nav-section">Navigation</div>
    <button class="nav-btn active">◈ Profile Editor</button>
    <button class="nav-btn" onclick="window.open('/','_blank')">↗ View Live Page</button>
    <div class="sidebar-bottom">
      <div class="user-chip">
        <div class="user-avatar" id="avatarInitial">?</div>
        <div><div class="user-name" id="sidebarUsername">...</div><div class="user-role">Admin</div></div>
      </div>
      <button class="logout-btn" id="logoutBtn">◀ Disconnect</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="page-title">PROFILE EDITOR</div>
    <div class="page-sub">Configure your bio link page</div>

    <div class="section">
      <div class="section-title">Identity</div>
      <div class="card">
        <div class="field">
          <label>Display Name</label>
          <input type="text" id="displayName" maxlength="60" placeholder="Your Name" />
        </div>
        <div class="field">
          <label>Bio</label>
          <textarea id="bio" rows="3" maxlength="300" placeholder="A short bio..."></textarea>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Name Font</div>
      <div class="card">
        <div class="font-grid" id="fontGrid"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Background Video</div>
      <div class="card">
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="videoInput" accept="video/mp4,video/webm,video/ogg,video/quicktime" />
          <div class="upload-icon">▶</div>
          <div class="upload-text">Drop video or click to browse</div>
          <div class="upload-sub">MP4 · WebM · MOV · Max 100MB</div>
        </div>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bg"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-txt" id="progressTxt">UPLOADING...</div>
        </div>
        <div class="current-video" id="currentVideo" style="display:none">
          <span style="color:var(--blue);font-size:18px">▶</span>
          <span class="video-name" id="videoFileName">video.mp4</span>
          <button class="remove-btn" id="removeVideoBtn">×</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Links</div>
      <div class="card">
        <div id="linksList"></div>
        <button class="add-link-btn" id="addLinkBtn">+ ADD LINK</button>
      </div>
    </div>

    <div class="save-row">
      <button class="save-btn" id="saveBtn">Save Profile</button>
      <span class="save-status" id="saveStatus">✓ SAVED</span>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-panel">
    <div class="preview-label">Live Preview</div>
    <div class="preview-phone">
      <div class="preview-content">
        <div class="preview-name" id="previewName">YOUR NAME</div>
        <div class="preview-bio" id="previewBio"></div>
        <div id="previewLinks"></div>
      </div>
    </div>
    <a href="/" target="_blank" class="view-live">↗ Open Live Page</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var FONTS = [
  {name:'Playfair Display',label:'Playfair'},
  {name:'Cormorant Garamond',label:'Cormorant'},
  {name:'DM Serif Display',label:'DM Serif'},
  {name:'Bebas Neue',label:'Bebas'},
  {name:'Abril Fatface',label:'Abril'},
  {name:'Cinzel',label:'Cinzel'},
  {name:'Josefin Sans',label:'Josefin'},
  {name:'Outfit',label:'Outfit'},
  {name:'Raleway',label:'Raleway'},
  {name:'Caveat',label:'Caveat'},
  {name:'Sacramento',label:'Sacramento'},
  {name:'Dancing Script',label:'Dancing'},
  {name:'Pacifico',label:'Pacifico'},
  {name:'Orbitron',label:'Orbitron'},
];

var selectedFont = 'Playfair Display';
var links = [];

// Build font grid
var grid = document.getElementById('fontGrid');
FONTS.forEach(function(f, i) {
  var el = document.createElement('div');
  el.className = 'font-opt' + (f.name === selectedFont ? ' selected' : '');
  el.innerHTML = '<div class="font-sample" style="font-family:\'' + f.name + '\',serif">Aa</div><div class="font-label">' + f.label + '</div>';
  el.addEventListener('click', function() { selectFont(f.name); });
  grid.appendChild(el);
});

function selectFont(name) {
  selectedFont = name;
  document.querySelectorAll('.font-opt').forEach(function(el, i) {
    el.classList.toggle('selected', FONTS[i] && FONTS[i].name === name);
  });
  updatePreview();
}

function updatePreview() {
  var name = document.getElementById('displayName').value || 'YOUR NAME';
  var bio = document.getElementById('bio').value || '';
  var pn = document.getElementById('previewName');
  pn.textContent = name;
  pn.style.fontFamily = "'" + selectedFont + "', serif";
  document.getElementById('previewBio').textContent = bio;
  var pl = document.getElementById('previewLinks');
  pl.innerHTML = links.slice(0,4).map(function(l){ return '<div class="preview-link">'+(l.label||l.url||'Link')+'</div>'; }).join('');
}

document.getElementById('displayName').addEventListener('input', updatePreview);
document.getElementById('bio').addEventListener('input', updatePreview);

// Load profile
fetch('/admin/profile').then(function(res) {
  if(res.status===401){window.location.href='/login';return Promise.reject();}
  return res.json();
}).then(function(data) {
  document.getElementById('sidebarUsername').textContent = data.username;
  document.getElementById('avatarInitial').textContent = (data.username||'?')[0].toUpperCase();
  document.getElementById('displayName').value = data.profile.display_name || '';
  document.getElementById('bio').value = data.profile.bio || '';
  selectedFont = data.profile.font_family || 'Playfair Display';
  document.querySelectorAll('.font-opt').forEach(function(el,i){ el.classList.toggle('selected', FONTS[i]&&FONTS[i].name===selectedFont); });
  links = data.profile.links || [];
  renderLinks();
  if(data.profile.video_path) showCurrentVideo(data.profile.video_path);
  updatePreview();
}).catch(function(){});

// Links
function renderLinks() {
  var list = document.getElementById('linksList');
  list.innerHTML = '';
  links.forEach(function(link, i) {
    var row = document.createElement('div');
    row.className = 'link-row';
    row.innerHTML = '<input type="text" placeholder="Label" value="'+esc(link.label)+'" /><input type="text" placeholder="https://..." value="'+esc(link.url)+'" /><button class="link-del">×</button>';
    row.querySelectorAll('input')[0].addEventListener('input', function(){ links[i].label = this.value; updatePreview(); });
    row.querySelectorAll('input')[1].addEventListener('input', function(){ links[i].url = this.value; });
    row.querySelector('.link-del').addEventListener('click', function(){ links.splice(i,1); renderLinks(); updatePreview(); });
    list.appendChild(row);
  });
}
document.getElementById('addLinkBtn').addEventListener('click', function(){ links.push({label:'',url:''}); renderLinks(); });

function esc(s){ return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Video upload
document.getElementById('videoInput').addEventListener('change', function(){ if(this.files[0]) uploadVideo(this.files[0]); });

function uploadVideo(file) {
  var zone = document.getElementById('uploadZone');
  var pw = document.getElementById('progressWrap');
  var pf = document.getElementById('progressFill');
  var pt = document.getElementById('progressTxt');
  zone.style.opacity='0.4'; zone.style.pointerEvents='none';
  pw.style.display='block';
  var fd = new FormData(); fd.append('video', file);
  var xhr = new XMLHttpRequest();
  xhr.open('POST','/admin/upload-video');
  xhr.upload.onprogress = function(e){ if(e.lengthComputable){ var p=Math.round(e.loaded/e.total*100); pf.style.width=p+'%'; pt.textContent='UPLOADING... '+p+'%'; }};
  xhr.onload = function(){
    zone.style.opacity='1'; zone.style.pointerEvents='auto'; pw.style.display='none';
    document.getElementById('videoInput').value='';
    try{
      var d=JSON.parse(xhr.responseText);
      if(xhr.status===200&&d.success){showCurrentVideo(d.video_path);showToast('VIDEO UPLOADED');}
      else showToast(d.error||'Upload failed',true);
    }catch(e){showToast('Upload failed',true);}
  };
  xhr.onerror = function(){ zone.style.opacity='1'; zone.style.pointerEvents='auto'; pw.style.display='none'; showToast('Upload failed',true); };
  xhr.send(fd);
}

function showCurrentVideo(path){
  var cv = document.getElementById('currentVideo');
  cv.style.display='flex';
  document.getElementById('videoFileName').textContent=path.split('/').pop();
}

document.getElementById('removeVideoBtn').addEventListener('click', function(){
  fetch('/admin/video',{method:'DELETE'}).then(function(){
    document.getElementById('currentVideo').style.display='none';
    showToast('VIDEO REMOVED');
  });
});

// Save
document.getElementById('saveBtn').addEventListener('click', function(){
  var btn = this;
  btn.disabled=true; btn.textContent='Saving...';
  fetch('/admin/profile',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({display_name:document.getElementById('displayName').value,bio:document.getElementById('bio').value,font_family:selectedFont,links:links})
  }).then(function(res){return res.json();}).then(function(d){
    if(d.success){
      showToast('PROFILE SAVED');
      var st=document.getElementById('saveStatus'); st.classList.add('show'); setTimeout(function(){st.classList.remove('show');},2500);
    } else showToast(d.error||'Save failed',true);
    btn.disabled=false; btn.textContent='Save Profile';
  }).catch(function(){ showToast('Error',true); btn.disabled=false; btn.textContent='Save Profile'; });
});

document.getElementById('logoutBtn').addEventListener('click', function(){
  fetch('/auth/logout',{method:'POST'}).then(function(){ window.location.href='/login'; });
});

function showToast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=(err?'✕ ':'◆ ')+msg;
  t.style.borderColor=err?'rgba(255,100,100,0.4)':'rgba(0,207,255,0.4)';
  t.style.color=err?'#ff6b6b':'var(--blue)';
  t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2500);
}
</script>
</body>
</html>
