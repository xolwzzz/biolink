<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&family=Cormorant+Garamond:ital,wght@0,600;1,600&family=DM+Serif+Display:ital@0;1&family=Bebas+Neue&family=Abril+Fatface&family=Cinzel:wght@700&family=Josefin+Sans:wght@600;700&family=Outfit:wght@600;700&family=Raleway:wght@700;800&family=Caveat:wght@700&family=Sacramento&family=Dancing+Script:wght@700&family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0c0c0c; color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }

    #splash { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.6s ease; }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splashText { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.45); user-select: none; animation: pulse 2.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 0.9; } }

    .video-bg { position: fixed; inset: 0; z-index: 0; }
    .video-bg video { width: 100%; height: 100%; object-fit: cover; }
    .video-bg .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.85) 100%); }
    .static-bg { position: fixed; inset: 0; z-index: 0; }

    /* Page layouts by position */
    .page { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.8s ease 0.2s; overflow: hidden; }
    .page.visible { opacity: 1; }

    /* Position variants */
    .page.pos-bottom { justify-content: flex-end; }
    .page.pos-top { justify-content: flex-start; }
    .page.pos-center { justify-content: center; }

    .container { width: 100%; max-width: 360px; margin: 0 auto; padding: 48px 24px 56px; }
    .page.pos-top .container { padding-top: 56px; padding-bottom: 24px; }
    .page.pos-center .container { padding-top: 24px; padding-bottom: 24px; }

    .avatar { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 18px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .name { font-weight: 700; text-align: center; margin-bottom: 8px; line-height: 1.1; letter-spacing: -0.02em; }
    .bio { text-align: center; line-height: 1.6; margin-bottom: 32px; max-width: 280px; margin-left: auto; margin-right: auto; opacity: 0.55; }
    .links { display: flex; flex-direction: column; gap: 10px; }
    .link-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 20px; text-align: center; text-decoration: none; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; transition: opacity 0.2s, transform 0.15s; backdrop-filter: blur(12px); }
    .link-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .link-icon { font-size: 18px; line-height: 1; flex-shrink: 0; }

    /* Card styles */
    .info-card { padding: 0; }
    .info-card.card-glass { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); border-radius: 20px; padding: 28px 24px 20px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); margin-bottom: 16px; }
    .info-card.card-solid { background: rgba(0,0,0,0.6); border: 1px solid rgba(0,0,0,0.4); border-radius: 20px; padding: 28px 24px 20px; margin-bottom: 16px; }
    .info-card.card-outline { border: 2px solid rgba(255,255,255,0.28); border-radius: 20px; padding: 28px 24px 20px; margin-bottom: 16px; }
    .info-card.card-blur { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 28px 24px 20px; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); margin-bottom: 16px; }
    .info-card.card-none .bio { margin-bottom: 24px; }

    .watermark { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 20; font-size: 11px; color: rgba(255,255,255,0.18); text-decoration: none; }
    .watermark:hover { color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div id="splash"><div id="splashText">click to enter</div></div>
  <div id="bg"></div>
  <main class="page pos-bottom" id="page">
    <div class="container">
      <div class="info-card card-none" id="infoCard">
        <div class="avatar" id="avatar" style="display:none"></div>
        <div class="name" id="name"></div>
        <div class="bio" id="bio"></div>
      </div>
      <div class="links" id="links"></div>
    </div>
  </main>
  <a class="watermark" href="/login">biolink</a>

  <script>
    var username = window.location.pathname.replace(/^\//, '').split('/')[0];
    var vid = null;

    fetch('/api/profile/' + encodeURIComponent(username))
      .then(function(r) {
        if (r.status === 404) { document.getElementById('splash').innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:14px;font-family:sans-serif">Page not found.</div>'; return Promise.reject(); }
        return r.json();
      })
      .then(function(d) {
        if (d.display_name) document.title = d.display_name;

        fetch('/api/view/' + encodeURIComponent(username), { method: 'POST' }).catch(function(){});

        // Splash
        var splash = document.getElementById('splash');
        splash.style.background = d.bg_color || '#0c0c0c';
        document.getElementById('splashText').textContent = d.enter_text || 'click to enter';

        // Background
        var bg = document.getElementById('bg');
        if (d.video_path) {
          var wrapper = document.createElement('div'); wrapper.className = 'video-bg';
          vid = document.createElement('video');
          vid.loop = true; vid.playsInline = true; vid.preload = 'auto'; vid.muted = true; vid.src = d.video_path;
          var overlay = document.createElement('div'); overlay.className = 'overlay';
          var opacity = d.overlay_opacity != null ? d.overlay_opacity : 0.5;
          overlay.style.background = 'linear-gradient(to bottom, rgba(0,0,0,' + (opacity * 0.4) + ') 0%, rgba(0,0,0,' + (opacity * 0.6) + ') 50%, rgba(0,0,0,' + (opacity * 1.4).toFixed(2) + ') 100%)';
          wrapper.appendChild(vid); wrapper.appendChild(overlay); bg.appendChild(wrapper);
          vid.load();
        } else {
          var div = document.createElement('div'); div.className = 'static-bg';
          div.style.background = d.bg_color || '#0c0c0c';
          bg.appendChild(div);
        }

        // Position
        var page = document.getElementById('page');
        page.className = 'page pos-' + (d.content_position || 'bottom');

        // Card style
        var infoCard = document.getElementById('infoCard');
        var cs = d.card_style || 'none';
        infoCard.className = 'info-card card-' + cs;

        // Avatar
        if (d.show_avatar) {
          var av = document.getElementById('avatar');
          av.style.display = 'flex'; av.textContent = d.avatar_emoji || '✦';
        }

        // Name
        var nameEl = document.getElementById('name');
        nameEl.textContent = d.display_name || '';
        nameEl.style.color = d.text_color || '#ffffff';
        nameEl.style.fontSize = (d.name_size || 36) + 'px';
        if (d.font_family) nameEl.style.fontFamily = "'" + d.font_family + "', serif";

        // Bio
        var bioEl = document.getElementById('bio');
        bioEl.textContent = d.bio || '';
        bioEl.style.color = d.text_color || '#ffffff';
        bioEl.style.fontSize = (d.bio_size || 14) + 'px';

        // Links
        var linksEl = document.getElementById('links');
        (d.links || []).forEach(function(l) {
          if (!l.url) return;
          var a = document.createElement('a');
          a.className = 'link-btn';
          a.href = l.url.startsWith('http') ? l.url : 'https://' + l.url;
          a.target = '_blank'; a.rel = 'noopener noreferrer';
          a.style.background = d.button_bg || 'rgba(255,255,255,0.07)';
          a.style.border = '1px solid ' + (d.button_border || 'rgba(255,255,255,0.1)');
          a.style.color = d.button_text_color || '#ffffff';
          a.style.borderRadius = (d.button_radius != null ? d.button_radius : 10) + 'px';

          if (l.icon) {
            var iconSpan = document.createElement('span');
            iconSpan.className = 'link-icon';
            iconSpan.textContent = l.icon;
            a.appendChild(iconSpan);
          }
          var labelSpan = document.createElement('span');
          labelSpan.textContent = l.label || l.url;
          a.appendChild(labelSpan);

          linksEl.appendChild(a);
        });
      })
      .catch(function() {});

    document.getElementById('splash').addEventListener('click', function() {
      var splash = this;
      splash.classList.add('hidden');
      document.getElementById('page').classList.add('visible');
      if (vid) {
        vid.muted = false;
        vid.play().catch(function() { vid.muted = true; vid.play().catch(function(){}); });
      }
      setTimeout(function() { splash.remove(); }, 700);
    });
  </script>
</body>
</html>
